name: Build and deploy Spring Boot app to Azure Web App - teamtaskmanagerethara

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ✅ IMPORTANT FIX
      - name: Build backend
        working-directory: backend/taskmanager
        run: mvn clean package -DskipTests

      # ✅ Upload correct JAR
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: backend/taskmanager/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      # ✅ Deploy JAR instead of WAR
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: teamtaskmanagerethara
          slot-name: Production
          package: '*.jar'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_94EE79DB3FC64DF6BFC480DD9F33BF3D }}
