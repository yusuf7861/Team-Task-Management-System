name: Build and Deploy Spring Boot to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Build backend (IMPORTANT: correct path)
      - name: Build Spring Boot app
        working-directory: backend/taskmanager
        run: mvn clean package -DskipTests

      # 4️⃣ Debug (helps avoid silent errors)
      - name: List build output
        run: ls -R backend/taskmanager/target

      # 5️⃣ Upload JAR
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: backend/taskmanager/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 6️⃣ Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      # 7️⃣ Debug check
      - name: Verify files
        run: |
          echo "Downloaded files:"
          ls -l

      # 8️⃣ Rename JAR → Azure expects fixed name
      - name: Rename JAR to app.jar
        run: mv *.jar app.jar

      # 9️⃣ Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: teamtaskmanagerethara
          slot-name: Production
          package: app.jar
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_94EE79DB3FC64DF6BFC480DD9F33BF3D }}
